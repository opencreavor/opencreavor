rules:
  - rule_id: openai-api-key-001
    rule_name: OpenAI API Key
    severity: high
    pattern: '\bsk-[A-Za-z0-9]{20,}\b'
  - rule_id: private-key-pem-001
    rule_name: PEM Private Key
    severity: high
    pattern: '(?s)-----BEGIN [A-Z0-9 ]*PRIVATE KEY-----.*?-----END [A-Z0-9 ]*PRIVATE KEY-----'
